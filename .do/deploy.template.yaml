spec:
  name: bones-app
  services:
    - environment_slug: php
      name: bones-app
      github:
        branch: main
        repo: bayfrontmedia/bones-app
        deploy_on_push: true
      run_command: heroku-php-apache2 public/
      envs:
        - key: APP_KEY
          value: "SECURE_APP_KEY"
          type: SECRET
        - key: APP_DEBUG
          value: "false"
        - key: APP_ENVIRONMENT
          value: "prod"
        - key: APP_TIMEZONE
          value: "UTC"
        - key: ROUTER_HOST
          value: "${APP_DOMAIN}"
        - key: ROUTER_ROUTE_PREFIX
          value: "/"